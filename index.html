<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phantom Mobile Connect</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#0e0e11;
color:white;
font-family:sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:#1a1a1f;
padding:40px;
border-radius:16px;
text-align:center;
width:320px;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:#8f7fff;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

#wallet{
margin-top:20px;
word-break:break-all;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h2>Connect Phantom</h2>

<button onclick="connectPhantom()">
Open Phantom
</button>

<div id="wallet"></div>

</div>

<script>

const dappURL = window.location.origin + window.location.pathname

function connectPhantom(){

const link =
`https://phantom.app/ul/browse/${encodeURIComponent(dappURL)}`

window.location.href = link

}

function readWallet(){

const params = new URLSearchParams(window.location.search)

const pubkey = params.get("public_key")

if(pubkey){
document.getElementById("wallet").innerText =
"Connected:\n" + pubkey
}

}

readWallet()

</script>

</body>
</html>
