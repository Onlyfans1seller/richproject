<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ByCashVault</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

</head>

<body>

<div class="bg"></div>

<header>

<div class="logo">ByCashVault</div>

<button id="connectBtn">
Connect Wallet
</button>

</header>

<div id="walletModal" class="modal">

<div class="modal-box">

<h2>Connect Wallet</h2>

<div class="wallet-grid">

<div class="wallet" id="metamask">MetaMask</div>
<div class="wallet" id="trust">Trust Wallet</div>
<div class="wallet" id="coinbase">Coinbase</div>
<div class="wallet" id="rainbow">Rainbow</div>
<div class="wallet" id="phantom">Phantom</div>

</div>

</div>

</div>

<section class="panel">

<div id="address"></div>
<div id="network"></div>
<div id="balance"></div>

</section>

<script type="module" src="app.js"></script>

</body>
</html>
